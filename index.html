<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Kalam:wght@300;400;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --topbar: #161616;
            --topbar-border: #2a2a2a;
            --btn-color: rgba(255, 255, 255, 0.45);
            --btn-hover-bg: rgba(255, 255, 255, 0.1);
            --btn-hover-color: rgba(255, 255, 255, 0.9);
            --sep-color: rgba(255, 255, 255, 0.1);
            --empty-color: rgba(255, 255, 255, 0.12);
            --dialog-bg: #1e1e1e;
            --dialog-title: #f0f0f0;
            --dialog-msg: rgba(240, 240, 240, 0.45);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* TOPBAR */
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 52px;
            background: var(--topbar);
            border-bottom: 1.5px solid var(--topbar-border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 12px;
            z-index: 1000;
            box-shadow: 0 1px 12px rgba(0, 0, 0, 0.5);
        }

        .board-title {
            font-family: 'Kalam', cursive;
            font-size: 20px;
            color: #e8e0d0;
            font-weight: 700;
            flex: 1;
        }

        .add-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            background: #e8e0d0;
            color: #111;
            border: none;
            border-radius: 22px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .add-btn:hover {
            background: #fff;
        }

        .add-btn:active {
            transform: scale(0.97);
        }

        .add-btn svg {
            width: 14px;
            height: 14px;
        }

        .color-dots {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .color-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s;
        }

        .color-dot:hover {
            transform: scale(1.2);
        }

        .color-dot.selected {
            border-color: #e8e0d0;
            transform: scale(1.15);
        }

        /* BOARD */
        .board {
            padding: 72px 24px 40px;
            columns: 4 260px;
            column-gap: 16px;
        }

        @media (max-width: 600px) {
            .board {
                columns: 2 150px;
                padding: 72px 12px 40px;
                column-gap: 10px;
            }
        }

        /* NOTE CARD */
        .note-card {
            break-inside: avoid;
            margin-bottom: 16px;
            border-radius: 12px;
            position: relative;
            display: inline-block;
            width: 100%;
            box-shadow: 0 2px 14px rgba(0, 0, 0, 0.55);
            transition: box-shadow 0.2s, transform 0.2s;
            animation: popIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .note-card:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.75);
            transform: translateY(-2px);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.85) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .note-inner {
            border-radius: 12px;
            overflow: hidden;
        }

        /* TOOLBAR */
        .note-toolbar {
            display: none;
            align-items: center;
            gap: 2px;
            padding: 6px 8px 5px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.06);
        }

        .note-card:focus-within .note-toolbar {
            display: flex;
        }

        .nt-btn {
            background: none;
            border: none;
            padding: 3px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 700;
            color: rgba(0, 0, 0, 0.4);
            transition: background 0.15s, color 0.15s;
            line-height: 1;
            font-family: 'DM Sans', sans-serif;
            white-space: nowrap;
        }

        .nt-btn:hover {
            background: rgba(0, 0, 0, 0.1);
            color: rgba(0, 0, 0, 0.8);
        }

        .nt-btn.italic {
            font-style: italic;
        }

        .nt-btn.underline {
            text-decoration: underline;
        }

        .nt-btn.strike {
            text-decoration: line-through;
        }

        .nt-btn.link-btn {
            color: #1d4ed8;
        }

        .nt-btn.link-btn:hover {
            background: rgba(29, 78, 216, 0.1);
            color: #1e40af;
        }

        .nt-btn.unlink-btn {
            color: #b91c1c;
        }

        .nt-btn.unlink-btn:hover {
            background: rgba(185, 28, 28, 0.1);
            color: #991b1b;
        }

        .nt-btn.undo-redo {
            font-size: 13px;
        }

        .nt-sep {
            width: 1px;
            height: 14px;
            background: rgba(0, 0, 0, 0.12);
            margin: 0 2px;
            flex-shrink: 0;
        }

        /* NOTE TEXT */
        .note-text {
            padding: 13px 13px 38px;
            min-height: 90px;
            font-family: 'Kalam', cursive;
            font-size: 15px;
            line-height: 1.65;
            color: #1a1008;
            outline: none;
            word-break: break-word;
        }

        .note-text:empty::before {
            content: attr(data-placeholder);
            color: rgba(26, 16, 8, 0.28);
            pointer-events: none;
        }

        /* NOTE FOOTER */
        .note-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .note-card:hover .note-footer,
        .note-card:focus-within .note-footer {
            opacity: 1;
        }

        .note-time {
            font-size: 10px;
            color: rgba(26, 16, 8, 0.3);
            font-family: 'DM Sans', sans-serif;
        }

        .note-action-btn {
            background: rgba(0, 0, 0, 0.07);
            border: none;
            border-radius: 4px;
            padding: 3px 7px;
            cursor: pointer;
            font-size: 11px;
            color: rgba(0, 0, 0, 0.35);
            transition: background 0.15s, color 0.15s;
        }

        .note-action-btn:hover {
            background: rgba(0, 0, 0, 0.13);
            color: rgba(0, 0, 0, 0.65);
        }

        .note-action-btn.del:hover {
            background: #fecaca;
            color: #b91c1c;
        }

        /* EMPTY STATE */
        .empty-state {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--empty-color);
            pointer-events: none;
            user-select: none;
        }

        .empty-state .big {
            font-size: 56px;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 14px;
            font-family: 'Kalam', cursive;
        }

        /* CONFIRM DIALOG */
        .dialog-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeO 0.15s ease;
        }

        @keyframes fadeO {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .dialog-box {
            background: var(--dialog-bg);
            border: 1px solid #333;
            border-radius: 14px;
            padding: 28px 28px 22px;
            width: 300px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            animation: slideU 0.2s cubic-bezier(0.34, 1.4, 0.64, 1);
            text-align: center;
        }

        @keyframes slideU {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .dialog-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .dialog-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--dialog-title);
            margin-bottom: 6px;
        }

        .dialog-msg {
            font-size: 13px;
            color: var(--dialog-msg);
            margin-bottom: 22px;
        }

        .dialog-btns {
            display: flex;
            gap: 10px;
        }

        .dialog-btn {
            flex: 1;
            padding: 9px 0;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
        }

        .dialog-btn:active {
            transform: scale(0.97);
        }

        .dialog-btn.cancel {
            background: #2a2a2a;
            color: #ccc;
        }

        .dialog-btn.cancel:hover {
            background: #333;
        }

        .dialog-btn.confirm-del {
            background: #ef4444;
            color: #fff;
        }

        .dialog-btn.confirm-del:hover {
            background: #dc2626;
        }

        /* LINKS */
        .note-link {
            color: #1d4ed8;
            text-decoration: underline;
            text-underline-offset: 2px;
            cursor: pointer;
            word-break: break-all;
        }

        .note-link:hover {
            color: #1e40af;
        }

        /* NOTE COLORS */
        .c-yellow {
            background: #fef08a;
        }

        .c-pink {
            background: #fbcfe8;
        }

        .c-green {
            background: #bbf7d0;
        }

        .c-blue {
            background: #bfdbfe;
        }

        .c-orange {
            background: #fed7aa;
        }

        .c-purple {
            background: #ddd6fe;
        }

        .c-white {
            background: #f5f5f5;
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="board-title">📋 My Board</div>
        <div class="color-dots" id="color-dots">
            <div class="color-dot selected" data-color="c-yellow" style="background:#fef08a" title="Yellow"></div>
            <div class="color-dot" data-color="c-pink" style="background:#fbcfe8" title="Pink"></div>
            <div class="color-dot" data-color="c-green" style="background:#bbf7d0" title="Green"></div>
            <div class="color-dot" data-color="c-blue" style="background:#bfdbfe" title="Blue"></div>
            <div class="color-dot" data-color="c-orange" style="background:#fed7aa" title="Orange"></div>
            <div class="color-dot" data-color="c-purple" style="background:#ddd6fe" title="Purple"></div>
            <div class="color-dot" data-color="c-white" style="background:#f5f5f5;border:1.5px solid #555"
                title="White"></div>
        </div>
        <button class="add-btn" onclick="addNote()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19" />
                <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add Note
        </button>
    </div>

    <div class="board" id="board"></div>
    <div class="empty-state" id="empty-state">
        <div class="big">📝</div>
        <p>Click "Add Note" to get started!</p>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('padlet_dark_v1') || '[]');
        let selectedColor = 'c-yellow';

        const placeholders = ['Write something…', 'A thought…', 'Note to self…', 'Ideas here…', 'Don\'t forget…', 'Reminder…'];

        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', () => {
                document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
                dot.classList.add('selected');
                selectedColor = dot.dataset.color;
            });
        });

        function formatTime(ts) {
            const d = new Date(ts), now = new Date(), diff = now - d;
            if (diff < 60000) return 'just now';
            if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
            if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function saveNotes() { localStorage.setItem('padlet_dark_v1', JSON.stringify(notes)); }

        function addNote() {
            const note = { id: Date.now().toString(36) + Math.random().toString(36).slice(2), color: selectedColor, content: '', created: Date.now(), updated: Date.now() };
            notes.unshift(note);
            saveNotes();
            renderNote(note, true);
            updateEmpty();
        }

        function renderNote(note, focus) {
            const board = document.getElementById('board');
            const ph = placeholders[Math.floor(Math.random() * placeholders.length)];
            const card = document.createElement('div');
            card.className = `note-card ${note.color}`;
            card.dataset.id = note.id;

            card.innerHTML = `
      <div class="note-inner">
        <div class="note-toolbar">
          <button class="nt-btn" onmousedown="return false" onclick="fmt('bold')"><b>B</b></button>
          <button class="nt-btn italic" onmousedown="return false" onclick="fmt('italic')">I</button>
          <button class="nt-btn underline" onmousedown="return false" onclick="fmt('underline')">U</button>
          <button class="nt-btn strike" onmousedown="return false" onclick="fmt('strikeThrough')">S</button>
          <div class="nt-sep"></div>
          <button class="nt-btn" onmousedown="return false" onclick="fmt('insertUnorderedList')">• List</button>
          <div class="nt-sep"></div>
          <button class="nt-btn link-btn" onmousedown="return false" onclick="insertLink(this)" title="Select text → click to linkify">🔗 Link</button>
          <button class="nt-btn unlink-btn" onmousedown="return false" onclick="removeLink(this)" title="Click inside a link → click to unlink">✂ Unlink</button>
          <div class="nt-sep"></div>
          <button class="nt-btn undo-redo" onmousedown="return false" onclick="fmt('undo')" title="Undo (Ctrl+Z)">↩</button>
          <button class="nt-btn undo-redo" onmousedown="return false" onclick="fmt('redo')" title="Redo (Ctrl+Y)">↪</button>
        </div>
        <div class="note-text" contenteditable="true" data-placeholder="${ph}" data-id="${note.id}">${note.content}</div>
        <div class="note-footer">
          <span class="note-time">${formatTime(note.updated)}</span>
          <div class="note-actions">
            <button class="note-action-btn del" onclick="deleteNote('${note.id}')">🗑</button>
          </div>
        </div>
      </div>`;

            board.insertBefore(card, board.firstChild);
            const textEl = card.querySelector('.note-text');

            textEl.addEventListener('input', () => {
                const n = notes.find(x => x.id === note.id);
                if (n) { n.content = textEl.innerHTML; n.updated = Date.now(); saveNotes(); card.querySelector('.note-time').textContent = formatTime(n.updated); }
            });

            textEl.addEventListener('blur', () => linkify(textEl, note.id));

            textEl.addEventListener('click', (e) => {
                const a = e.target.closest('a.note-link');
                if (a) { e.preventDefault(); e.stopPropagation(); window.open(a.href, '_blank', 'noopener'); }
            });

            if (focus) {
                setTimeout(() => {
                    textEl.focus();
                    const r = document.createRange(), s = window.getSelection();
                    r.selectNodeContents(textEl); r.collapse(false);
                    s.removeAllRanges(); s.addRange(r);
                }, 50);
            }
        }

        /* AUTO-LINKIFY on blur */
        function linkify(el, noteId) {
            const html = el.innerHTML;
            const linked = html.replace(
                /(?<!href=["']|">)(https?:\/\/[^\s<>"'&]+|www\.[^\s<>"'&]+)/g,
                (url) => {
                    const href = url.startsWith('http') ? url : 'https://' + url;
                    return `<a class="note-link" href="${href}" target="_blank" rel="noopener" contenteditable="false">${url}</a>`;
                }
            );
            if (linked !== html) {
                el.innerHTML = linked;
                const n = notes.find(x => x.id === noteId);
                if (n) { n.content = el.innerHTML; saveNotes(); }
            }
        }

        /* INSERT LINK — select text → 🔗 Link → becomes clickable */
        function insertLink(btn) {
            const textEl = btn.closest('.note-inner').querySelector('.note-text');
            const sel = window.getSelection();
            if (!sel || sel.rangeCount === 0 || sel.isCollapsed) {
                flashBtn(btn); return;
            }
            const selectedText = sel.toString().trim();
            if (!selectedText) return;

            let url = selectedText;
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

            const range = sel.getRangeAt(0);
            const a = document.createElement('a');
            a.href = url; a.textContent = selectedText;
            a.className = 'note-link'; a.target = '_blank'; a.rel = 'noopener'; a.contentEditable = 'false';
            range.deleteContents(); range.insertNode(a);
            sel.removeAllRanges();

            const n = notes.find(x => x.id === textEl.dataset.id);
            if (n) { n.content = textEl.innerHTML; n.updated = Date.now(); saveNotes(); }
        }

        /* REMOVE LINK — click inside a link → ✂ Unlink → plain text */
        function removeLink(btn) {
            const textEl = btn.closest('.note-inner').querySelector('.note-text');
            const sel = window.getSelection();
            let targetLink = null;

            if (sel && sel.rangeCount > 0) {
                let node = sel.getRangeAt(0).commonAncestorContainer;
                while (node && node !== textEl) {
                    if (node.nodeName === 'A') { targetLink = node; break; }
                    node = node.parentNode;
                }
                if (!targetLink) {
                    targetLink = [...textEl.querySelectorAll('a.note-link')].find(a => sel.containsNode(a, true));
                }
            }

            if (!targetLink) { flashBtn(btn); return; }

            const text = document.createTextNode(targetLink.textContent);
            targetLink.replaceWith(text);

            const n = notes.find(x => x.id === textEl.dataset.id);
            if (n) { n.content = textEl.innerHTML; n.updated = Date.now(); saveNotes(); }
        }

        function flashBtn(btn) {
            btn.style.background = 'rgba(251,191,36,0.35)';
            setTimeout(() => btn.style.background = '', 600);
        }

        function fmt(cmd) { document.execCommand(cmd, false, null); }

        function deleteNote(id) {
            const overlay = document.createElement('div');
            overlay.className = 'dialog-overlay';
            overlay.innerHTML = `
      <div class="dialog-box">
        <div class="dialog-icon">🗑️</div>
        <div class="dialog-title">Delete this note?</div>
        <div class="dialog-msg">This can't be undone.</div>
        <div class="dialog-btns">
          <button class="dialog-btn cancel" id="dlg-cancel">Cancel</button>
          <button class="dialog-btn confirm-del" id="dlg-confirm">Delete</button>
        </div>
      </div>`;
            document.body.appendChild(overlay);
            setTimeout(() => overlay.querySelector('#dlg-confirm').focus(), 50);
            overlay.querySelector('#dlg-cancel').onclick = () => overlay.remove();
            overlay.querySelector('#dlg-confirm').onclick = () => {
                overlay.remove();
                notes = notes.filter(n => n.id !== id);
                saveNotes();
                const card = document.querySelector(`.note-card[data-id="${id}"]`);
                if (card) { card.style.transition = 'opacity 0.2s, transform 0.2s'; card.style.opacity = '0'; card.style.transform = 'scale(0.85)'; setTimeout(() => card.remove(), 200); }
                updateEmpty();
            };
            overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
            const onKey = e => { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', onKey); } };
            document.addEventListener('keydown', onKey);
        }

        function updateEmpty() {
            document.getElementById('empty-state').style.display = notes.length === 0 ? 'block' : 'none';
        }

        function init() {
            notes.forEach(note => renderNote(note, false));
            document.querySelectorAll('.note-text').forEach(el => linkify(el, el.dataset.id));
            updateEmpty();
        }

        init();
    </script>
</body>

</html>
